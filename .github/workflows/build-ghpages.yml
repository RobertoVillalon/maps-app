name: Deploy Angular to GitHub Pages

on:
  workflow_dispatch:
permissions:
  contents: write

jobs:
  deploy:
    uses: RobertoVillalon/infraestructura/.github/workflows/deployAngularToGithubPages.yml@main
    with:
      working_directory: "."
      base_href: "/maps/"
      publish_dir: "./dist/maps/browser"
      environments_variables: |
        {
          production: true,
          mapboxKey: '${{ secrets.MAPBOX_TOKEN }}'
        }
