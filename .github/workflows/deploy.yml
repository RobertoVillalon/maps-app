name: Deploy

on:
  workflow_dispatch:
permissions:
  contents: write
  
jobs:
  deploy:
    uses: RobertoVillalon/infraestructura/.github/workflows/deployAngularToGithubPages.yml@main
    with:
      working_directory: "."
      base_href: "/maps-app/"
      publish_dir: "./dist/maps-app/browser"
      environments_variables: |
        {
          production: true,
          mapboxKey: MAPBOX_TOKEN
        }
